<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Handshake icon for Business Development -->
  <g transform="translate(60,58)" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hand -->
    <path d="M-28,8 L-20,-8 L-8,-8 L0,0"/>
    <!-- Right hand -->
    <path d="M28,8 L20,-8 L8,-8 L0,0"/>
    <!-- Handshake clasp -->
    <path d="M-6,0 C-2,-6 2,-6 6,0"/>
    <path d="M-10,4 L-16,14"/>
    <path d="M10,4 L16,14"/>
    <!-- Growth arrow -->
    <path d="M-12,-22 L0,-30 L12,-22" stroke-width="2.5"/>
    <line x1="0" y1="-30" x2="0" y2="-16" stroke-width="2.5"/>
  </g>
  <!-- BD text -->
  <text x="60" y="100" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="system-ui,sans-serif" font-size="11" font-weight="600">BD</text>
</svg>