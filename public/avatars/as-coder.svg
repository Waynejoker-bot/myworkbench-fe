<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Server/Architecture icon -->
  <g transform="translate(60,55)" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top server box -->
    <rect x="-22" y="-28" width="44" height="16" rx="3"/>
    <circle cx="-12" cy="-20" r="2" fill="white"/>
    <line x1="2" y1="-20" x2="14" y2="-20"/>
    <!-- Bottom server box -->
    <rect x="-22" y="-6" width="44" height="16" rx="3"/>
    <circle cx="-12" cy="2" r="2" fill="white"/>
    <line x1="2" y1="2" x2="14" y2="2"/>
    <!-- Connection lines -->
    <line x1="0" y1="10" x2="0" y2="20"/>
    <polyline points="-14,20 0,20 14,20"/>
    <line x1="-14" y1="20" x2="-14" y2="26"/>
    <line x1="14" y1="20" x2="14" y2="26"/>
    <circle cx="-14" cy="28" r="3"/>
    <circle cx="0" cy="28" r="3"/>
    <circle cx="14" cy="28" r="3"/>
    <line x1="0" y1="20" x2="0" y2="26"/>
  </g>
  <!-- AS text -->
  <text x="60" y="102" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="system-ui,sans-serif" font-size="11" font-weight="600">ARCH</text>
</svg>