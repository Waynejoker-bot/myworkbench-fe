<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Code brackets < /> for frontend -->
  <g transform="translate(60,56)" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left angle bracket < -->
    <polyline points="-12,-18 -28,0 -12,18"/>
    <!-- Right angle bracket > -->
    <polyline points="12,-18 28,0 12,18"/>
    <!-- Slash / -->
    <line x1="6" y1="-20" x2="-6" y2="20"/>
  </g>
  <!-- Palette dot accent -->
  <circle cx="88" cy="28" r="6" fill="#FFD93D" opacity="0.9"/>
  <circle cx="76" cy="22" r="4" fill="#6BCB77" opacity="0.9"/>
  <!-- FE text -->
  <text x="60" y="100" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="system-ui,sans-serif" font-size="11" font-weight="600">FE</text>
</svg>