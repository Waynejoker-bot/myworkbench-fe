<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Clipboard/Secretary icon -->
  <g transform="translate(60,56)" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Clipboard -->
    <rect x="-20" y="-22" width="40" height="50" rx="4"/>
    <!-- Clip at top -->
    <rect x="-8" y="-28" width="16" height="10" rx="3"/>
    <!-- Lines on clipboard -->
    <line x1="-10" y1="-8" x2="10" y2="-8" stroke-width="2"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke-width="2"/>
    <line x1="-10" y1="8" x2="4" y2="8" stroke-width="2"/>
    <!-- Checkmark -->
    <polyline points="-10,16 -4,22 10,10" stroke-width="2.5"/>
  </g>
  <!-- Calendar accent -->
  <circle cx="90" cy="26" r="5" fill="white" opacity="0.3"/>
  <text x="60" y="102" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui,sans-serif" font-size="9" font-weight="600">SEC</text>
</svg>