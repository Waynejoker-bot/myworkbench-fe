<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Terminal/Console icon for full-stack coder -->
  <g transform="translate(60,54)" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Terminal window -->
    <rect x="-28" y="-26" width="56" height="42" rx="5"/>
    <!-- Title bar -->
    <line x1="-28" y1="-16" x2="28" y2="-16"/>
    <circle cx="-20" cy="-21" r="2" fill="white" opacity="0.6"/>
    <circle cx="-12" cy="-21" r="2" fill="white" opacity="0.6"/>
    <!-- Prompt arrow > -->
    <polyline points="-16,-4 -8,4 -16,12" stroke-width="2.5"/>
    <!-- Cursor line -->
    <line x1="-2" y1="4" x2="16" y2="4" stroke-width="2.5"/>
  </g>
  <!-- MS text -->
  <text x="60" y="100" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="system-ui,sans-serif" font-size="11" font-weight="600">MS</text>
</svg>