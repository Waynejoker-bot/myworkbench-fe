<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Nvwa (女娲) creation/magic icon - sparkle + hand creating -->
  <g transform="translate(60,54)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Magic wand / creation stick -->
    <line x1="-18" y1="22" x2="8" y2="-8"/>
    <!-- Sparkle star top -->
    <path d="M14,-20 L16,-14 L22,-12 L16,-10 L14,-4 L12,-10 L6,-12 L12,-14 Z" fill="white" stroke="none"/>
    <!-- Small sparkle -->
    <path d="M-8,-22 L-6,-18 L-2,-16 L-6,-14 L-8,-10 L-10,-14 L-14,-16 L-10,-18 Z" fill="white" stroke="none" opacity="0.7"/>
    <!-- Creation circle -->
    <circle cx="12" cy="-12" r="16" stroke-width="2" opacity="0.5"/>
    <!-- Small dots representing creation -->
    <circle cx="-20" cy="-6" r="2" fill="white" opacity="0.6"/>
    <circle cx="26" cy="4" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="-6" cy="16" r="1.5" fill="white" opacity="0.5"/>
  </g>
  <text x="60" y="102" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="1">NVWA</text>
</svg>