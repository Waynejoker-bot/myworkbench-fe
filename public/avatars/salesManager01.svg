<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6d365"/>
      <stop offset="100%" style="stop-color:#fda085"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Sales chart + person icon -->
  <g transform="translate(60,54)" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Rising bar chart -->
    <rect x="-26" y="8" width="10" height="18" rx="2" fill="white" opacity="0.4"/>
    <rect x="-12" y="-2" width="10" height="28" rx="2" fill="white" opacity="0.5"/>
    <rect x="2" y="-14" width="10" height="40" rx="2" fill="white" opacity="0.6"/>
    <!-- Trophy/star at top -->
    <path d="M16,-26 L18,-20 L24,-18 L18,-16 L16,-10 L14,-16 L8,-18 L14,-20 Z" fill="white" stroke="none"/>
    <!-- Trend line -->
    <polyline points="-22,6 -8,-4 6,-16 18,-26" stroke-width="2" opacity="0.7"/>
  </g>
  <text x="60" y="102" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="9" font-weight="600">SALES</text>
</svg>