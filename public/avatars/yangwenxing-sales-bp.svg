<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e"/>
      <stop offset="100%" style="stop-color:#fecfef"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Business Partner - People + Connection icon -->
  <g transform="translate(60,52)" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left person -->
    <circle cx="-18" cy="-14" r="8" stroke-width="2.5"/>
    <path d="M-30,10 C-30,-2 -6,-2 -6,10" stroke-width="2.5"/>
    <!-- Right person -->
    <circle cx="18" cy="-14" r="8" stroke-width="2.5"/>
    <path d="M6,10 C6,-2 30,-2 30,10" stroke-width="2.5"/>
    <!-- Connection bridge -->
    <path d="M-6,4 L0,-2 L6,4" stroke-width="2" opacity="0.7"/>
    <line x1="0" y1="-2" x2="0" y2="8" stroke-width="2" opacity="0.7"/>
    <!-- Dollar sign small -->
    <text x="0" y="26" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-size="14" font-weight="700" opacity="0.5">$</text>
  </g>
  <text x="60" y="102" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="system-ui,sans-serif" font-size="9" font-weight="600">BP</text>
</svg>