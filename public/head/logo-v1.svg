<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1221;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#070a11;stop-opacity:1" />
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="blur" in2="SourceGraphic" operator="out" result="outerBlur" />
      <feMerge>
        <feMergeNode in="outerBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="320" height="100" rx="12" fill="url(#bgGrad)" />

  <!-- Subtle circuit lines -->
  <line x1="20" y1="85" x2="80" y2="85" stroke="#0ea5e9" stroke-opacity="0.15" stroke-width="1" />
  <line x1="240" y1="85" x2="300" y2="85" stroke="#0ea5e9" stroke-opacity="0.15" stroke-width="1" />
  <circle cx="80" cy="85" r="2" fill="#0ea5e9" fill-opacity="0.2" />
  <circle cx="240" cy="85" r="2" fill="#0ea5e9" fill-opacity="0.2" />
  <line x1="20" y1="15" x2="60" y2="15" stroke="#0ea5e9" stroke-opacity="0.1" stroke-width="1" />
  <line x1="260" y1="15" x2="300" y2="15" stroke="#0ea5e9" stroke-opacity="0.1" stroke-width="1" />

  <!-- Main ARM text with glow -->
  <text x="160" y="68" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', sans-serif" font-size="60" font-weight="700" letter-spacing="12" fill="url(#glow)" filter="url(#neon)">ARM</text>

  <!-- Top accent line -->
  <rect x="95" y="16" width="130" height="2" rx="1" fill="url(#glow)" opacity="0.6" />
  <!-- Bottom accent line -->
  <rect x="95" y="82" width="130" height="2" rx="1" fill="url(#glow)" opacity="0.6" />
</svg>