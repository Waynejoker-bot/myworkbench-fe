<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9" />
      <stop offset="40%" style="stop-color:#38bdf8" />
      <stop offset="100%" style="stop-color:#0ea5e9" />
    </linearGradient>
    <linearGradient id="bgG3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1221" />
      <stop offset="100%" style="stop-color:#070a11" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="300" height="100" rx="16" fill="url(#bgG3)" />

  <!-- Left bracket -->
  <path d="M 42,22 L 28,22 Q 22,22 22,28 L 22,72 Q 22,78 28,78 L 42,78"
    fill="none" stroke="url(#grad3)" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />

  <!-- Right bracket -->
  <path d="M 258,22 L 272,22 Q 278,22 278,28 L 278,72 Q 278,78 272,78 L 258,78"
    fill="none" stroke="url(#grad3)" stroke-width="2.5" stroke-linecap="round" opacity="0.8" />

  <!-- Small dots decoration -->
  <circle cx="22" cy="50" r="2" fill="#0ea5e9" opacity="0.5" />
  <circle cx="278" cy="50" r="2" fill="#0ea5e9" opacity="0.5" />

  <!-- ARM text - tech style with custom letter spacing -->
  <text x="150" y="66" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="48" font-weight="700" letter-spacing="18" fill="url(#grad3)" filter="url(#softGlow)">ARM</text>

  <!-- Subtle scan line -->
  <rect x="55" y="78" width="190" height="1" fill="url(#grad3)" opacity="0.2" />
  <rect x="70" y="82" width="160" height="0.5" fill="url(#grad3)" opacity="0.1" />
</svg>