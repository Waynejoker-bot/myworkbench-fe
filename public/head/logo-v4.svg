<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Main cyan gradient -->
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9" />
      <stop offset="50%" style="stop-color:#38bdf8" />
      <stop offset="100%" style="stop-color:#06b6d4" />
    </linearGradient>

    <!-- Reverse gradient for variety -->
    <linearGradient id="grad4r" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4" />
      <stop offset="100%" style="stop-color:#38bdf8" />
    </linearGradient>

    <!-- Background gradient -->
    <radialGradient id="bgG4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#111a2e" />
      <stop offset="60%" style="stop-color:#0c1221" />
      <stop offset="100%" style="stop-color:#070a11" />
    </radialGradient>

    <!-- Center glow behind text -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0" />
    </radialGradient>

    <!-- Text glow filter -->
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Stronger outer glow for text -->
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1" />
        <feMergeNode in="blur2" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle ring glow -->
    <filter id="ringGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- ===== BACKGROUND ===== -->
  <circle cx="50" cy="50" r="49" fill="url(#bgG4)" />

  <!-- Center ambient glow -->
  <circle cx="50" cy="50" r="40" fill="url(#centerGlow)" />

  <!-- ===== OUTER RING ===== -->
  <circle cx="50" cy="50" r="47" fill="none" stroke="url(#grad4)" stroke-width="1.2" opacity="0.5" filter="url(#ringGlow)" />

  <!-- ===== TECH TICK MARKS on outer ring ===== -->
  <!-- Top -->
  <line x1="50" y1="3" x2="50" y2="8" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round" opacity="0.6" />
  <!-- Bottom -->
  <line x1="50" y1="92" x2="50" y2="97" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round" opacity="0.6" />
  <!-- Left -->
  <line x1="3" y1="50" x2="8" y2="50" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round" opacity="0.6" />
  <!-- Right -->
  <line x1="92" y1="50" x2="97" y2="50" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round" opacity="0.6" />

  <!-- Diagonal small ticks -->
  <line x1="14.6" y1="14.6" x2="17.8" y2="17.8" stroke="#0ea5e9" stroke-width="0.8" stroke-linecap="round" opacity="0.3" />
  <line x1="85.4" y1="14.6" x2="82.2" y2="17.8" stroke="#0ea5e9" stroke-width="0.8" stroke-linecap="round" opacity="0.3" />
  <line x1="14.6" y1="85.4" x2="17.8" y2="82.2" stroke="#0ea5e9" stroke-width="0.8" stroke-linecap="round" opacity="0.3" />
  <line x1="85.4" y1="85.4" x2="82.2" y2="82.2" stroke="#0ea5e9" stroke-width="0.8" stroke-linecap="round" opacity="0.3" />

  <!-- ===== INNER DECORATIVE RING ===== -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#grad4)" stroke-width="0.4" opacity="0.2" />

  <!-- ===== ACCENT ARCS ===== -->
  <!-- Top arc - wider, bolder -->
  <path d="M 20,20 A 42,42 0 0,1 80,20" fill="none" stroke="url(#grad4)" stroke-width="2" stroke-linecap="round" opacity="0.5" filter="url(#ringGlow)" />
  <!-- Bottom arc -->
  <path d="M 20,80 A 42,42 0 0,0 80,80" fill="none" stroke="url(#grad4r)" stroke-width="2" stroke-linecap="round" opacity="0.5" filter="url(#ringGlow)" />

  <!-- Short side arcs -->
  <path d="M 12,35 A 42,42 0 0,0 12,65" fill="none" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round" opacity="0.25" />
  <path d="M 88,35 A 42,42 0 0,1 88,65" fill="none" stroke="#0ea5e9" stroke-width="1.2" stroke-linecap="round" opacity="0.25" />

  <!-- ===== ARC ENDPOINT DOTS ===== -->
  <circle cx="20" cy="20" r="1.8" fill="#38bdf8" opacity="0.7" />
  <circle cx="80" cy="20" r="1.8" fill="#38bdf8" opacity="0.7" />
  <circle cx="20" cy="80" r="1.8" fill="#38bdf8" opacity="0.7" />
  <circle cx="80" cy="80" r="1.8" fill="#38bdf8" opacity="0.7" />

  <!-- ===== ARM TEXT ===== -->
  <!-- Shadow layer for depth -->
  <text x="50" y="57" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif" font-size="30" font-weight="800" letter-spacing="4" fill="#0ea5e9" opacity="0.3" filter="url(#iconGlow)">ARM</text>
  <!-- Main text -->
  <text x="50" y="57" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif" font-size="30" font-weight="800" letter-spacing="4" fill="url(#grad4)" filter="url(#textGlow)">ARM</text>

  <!-- ===== SUBTLE SCAN LINE ===== -->
  <line x1="30" y1="68" x2="70" y2="68" stroke="#0ea5e9" stroke-width="0.5" opacity="0.15" />
</svg>